<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Measurement App - Smart Measurement Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="landing-navbar">
        <div class="landing-logo">
            <div class="logo-icon">📐</div>
            <span>Quantity Measurement</span>
        </div>
        <div class="landing-nav-menu">
            <a href="index.html">Calculations</a>
            <a href="about.html">About</a>
        </div>
        <div class="landing-nav-buttons">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
            <a href="login.html" class="btn btn-secondary">Login</a>
            <a href="register.html" class="btn btn-primary">Register</a>
        </div>
    </nav>

    <!-- Main Calculation Interface -->
    <div class="calculation-container">
        <!-- Welcome Banner -->
        <div class="calculation-banner">
            <h1>Quantity Measurement Calculator</h1>
            <p>Perform calculations instantly. <a href="register.html" style="color: var(--primary-blue); text-decoration: none;">Register</a> to save your calculation history.</p>
        </div>

        <!-- Calculation Box -->
        <div class="content-card">
            <h3 id="operation-title">Compare Two Quantities</h3>
            
            <!-- Operation Selector -->
            <div class="operation-selector">
                <label>Select Operation:</label>
                <div class="operation-pills">
                    <button class="operation-pill active" onclick="switchOperation('compare')">Compare</button>
                    <button class="operation-pill" onclick="switchOperation('convert')">Convert</button>
                    <button class="operation-pill" onclick="switchOperation('add')">Add</button>
                    <button class="operation-pill" onclick="switchOperation('subtract')">Subtract</button>
                    <button class="operation-pill" onclick="switchOperation('divide')">Divide</button>
                </div>
            </div>
            
            <!-- Measurement Type Selector -->
            <div class="measurement-selector">
                <label>Measurement Type:</label>
                <div class="type-pills">
                    <button class="type-pill active" onclick="selectMeasurementType('LENGTH')">Length</button>
                    <button class="type-pill" onclick="selectMeasurementType('WEIGHT')">Weight</button>
                    <button class="type-pill" onclick="selectMeasurementType('VOLUME')">Volume</button>
                    <button class="type-pill" onclick="selectMeasurementType('TEMPERATURE')">Temperature</button>
                </div>
            </div>

            <!-- Compare Operation -->
            <div id="operation-compare" class="operation-content active">
                <div class="form-row">
                    <div class="input-group">
                        <label>Quantity 1</label>
                        <input type="number" id="compare-val1" placeholder="Enter value">
                        <select id="compare-unit1"></select>
                    </div>
                    <div class="input-group">
                        <label>Quantity 2</label>
                        <input type="number" id="compare-val2" placeholder="Enter value">
                        <select id="compare-unit2"></select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="doCompare()">Compare</button>
                <div id="result-compare" class="result-box hidden">
                    <div class="label">Result</div>
                    <div class="value" id="result-compare-value"></div>
                </div>
            </div>

            <!-- Convert Operation -->
            <div id="operation-convert" class="operation-content">
                <div class="conversion-container">
                    <div class="input-group">
                        <label>Enter Value</label>
                        <input type="number" id="convert-val" placeholder="Enter value">
                        <select id="convert-from"></select>
                    </div>
                    <div class="arrow-icon">→</div>
                    <div class="input-group">
                        <label>Convert To</label>
                        <select id="convert-to"></select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="doConvert()">Convert</button>
                <div id="result-convert" class="result-box hidden">
                    <div class="label">Result</div>
                    <div class="value" id="result-convert-value"></div>
                    <div class="explanation" id="result-convert-exp"></div>
                </div>
            </div>

            <!-- Add Operation -->
            <div id="operation-add" class="operation-content">
                <div class="form-row">
                    <div class="input-group">
                        <label>Quantity 1</label>
                        <input type="number" id="add-val1" placeholder="Enter value">
                        <select id="add-unit1"></select>
                    </div>
                    <div class="input-group">
                        <label>Quantity 2</label>
                        <input type="number" id="add-val2" placeholder="Enter value">
                        <select id="add-unit2"></select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="doAdd()">Add</button>
                <div id="result-add" class="result-box hidden">
                    <div class="label">Result</div>
                    <div class="value" id="result-add-value"></div>
                </div>
            </div>

            <!-- Subtract Operation -->
            <div id="operation-subtract" class="operation-content">
                <div class="form-row">
                    <div class="input-group">
                        <label>Quantity 1</label>
                        <input type="number" id="subtract-val1" placeholder="Enter value">
                        <select id="subtract-unit1"></select>
                    </div>
                    <div class="input-group">
                        <label>Quantity 2</label>
                        <input type="number" id="subtract-val2" placeholder="Enter value">
                        <select id="subtract-unit2"></select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="doSubtract()">Subtract</button>
                <div id="result-subtract" class="result-box hidden">
                    <div class="label">Result</div>
                    <div class="value" id="result-subtract-value"></div>
                </div>
            </div>

            <!-- Divide Operation -->
            <div id="operation-divide" class="operation-content">
                <div class="form-row">
                    <div class="input-group">
                        <label>Quantity 1</label>
                        <input type="number" id="divide-val1" placeholder="Enter value">
                        <select id="divide-unit1"></select>
                    </div>
                    <div class="input-group">
                        <label>Quantity 2</label>
                        <input type="number" id="divide-val2" placeholder="Enter value">
                        <select id="divide-unit2"></select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="doDivide()">Divide</button>
                <div id="result-divide" class="result-box hidden">
                    <div class="label">Result</div>
                    <div class="value" id="result-divide-value"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/calculator.js"></script>
</body>
</html>
