<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Measurement App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="landing-container">
        <div class="landing-card">
            <div style="text-align:right; margin-bottom:16px;">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
            </div>
            <h1>Quantity Measurement App</h1>
            <p>Compare, Convert, Add, Subtract and Divide quantities across different units.</p>
            <div class="landing-buttons">
                <a href="login.html" class="btn btn-primary">Login</a>
                <a href="register.html" class="btn btn-outline">Register</a>
            </div>
            <div class="supported-units">
                <h3>Supported Units</h3>
                <div class="units-grid">
                    <div class="unit-card">Length<br><small>FEET, INCHES, YARDS, CM</small></div>
                    <div class="unit-card">Weight<br><small>GRAM, KG, POUND, TONNE</small></div>
                    <div class="unit-card">Volume<br><small>LITRE, MILLILITRE, GALLON</small></div>
                    <div class="unit-card">Temperature<br><small>CELSIUS, FAHRENHEIT, KELVIN</small></div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
