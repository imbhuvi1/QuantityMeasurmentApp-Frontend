<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Quantity Measurement App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="dashboard-navbar">
        <div class="dashboard-logo">Admin Dashboard</div>
        <div class="dashboard-nav-right">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
            <span id="adminName" class="user-name"></span>
            <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Dashboard Layout -->
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-label">ADMIN MENU</div>
            <button class="sidebar-item active" onclick="showUsers()">Users</button>
            <button class="sidebar-item" onclick="showStats()">Statistics</button>
            <div class="sidebar-divider"></div>
            <button class="sidebar-item" onclick="goToDashboard()">User Dashboard</button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Cards -->
            <div id="stats-section" class="stats-grid">
                <div class="stat-card">
                    <h3>Total Users</h3>
                    <div class="stat-number" id="totalUsers">-</div>
                </div>
                <div class="stat-card">
                    <h3>Regular Users</h3>
                    <div class="stat-number" id="regularUsers">-</div>
                </div>
                <div class="stat-card">
                    <h3>Admin Users</h3>
                    <div class="stat-number" id="adminUsers">-</div>
                </div>
            </div>

            <!-- Users Management -->
            <div id="users-section" class="content-card">
                <h3>User Management</h3>
                <div class="admin-actions">
                    <button class="btn btn-primary btn-sm" onclick="loadUsers()">Refresh Users</button>
                </div>
                <div id="users-table-container">
                    <p>Click "Refresh Users" to load user data.</p>
                </div>
            </div>

            <!-- Success/Error Messages -->
            <div id="admin-success" class="success-msg hidden"></div>
            <div id="admin-error" class="error-msg hidden"></div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
