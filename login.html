<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quantity Measurement App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="landing-navbar">
        <div class="landing-logo">
            <div class="logo-icon">📐</div>
            <span>Quantity Measurement</span>
        </div>
        <div class="landing-nav-menu">
            <a href="index.html">Calculations</a>
            <a href="about.html">About</a>
        </div>
        <div class="landing-nav-buttons">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
            <a href="register.html" class="btn btn-primary">Register</a>
        </div>
    </nav>

    <!-- Centered Login Container -->
    <div class="auth-center-container">
        <div class="auth-center-card">
            <h2>Login</h2>
            <p class="subtitle">Welcome back! Please login to your account.</p>

            <div id="error-msg" class="error-msg hidden"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Login</button>
            </form>

            <div class="auth-divider">
                <hr>
                <span>OR</span>
                <hr>
            </div>

            <a href="http://localhost:8081/oauth2/authorization/google" class="btn btn-outline btn-full google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Continue with Google
            </a>

            <p class="auth-link">Don't have an account? <a href="register.html">Register</a></p>
            <p class="auth-link"><a href="index.html">← Back to Calculations</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        redirectIfLoggedIn();
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('error-msg');

            btn.textContent = 'Logging in...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({ 
                        email: data.email, 
                        name: data.name
                    }));
                    
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = 'Invalid email or password';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Make sure backend is running.';
                errorMsg.classList.remove('hidden');
            }

            btn.textContent = 'Login';
            btn.disabled = false;
        });
    </script>
</body>
</html>
