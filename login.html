<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quantity Measurement App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align:right; margin-bottom:16px;">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
            </div>
            <h2>Login</h2>
            <p class="auth-subtitle">Welcome back!</p>

            <div id="error-msg" class="error-msg hidden"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Login</button>
            </form>

            <p class="auth-link">Don't have an account? <a href="register.html">Register</a></p>
            <p class="auth-link"><a href="index.html">← Back to Home</a></p>

            <div style="text-align:center; margin-top:20px;">
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
                    <hr style="flex:1; border-color:var(--border)">
                    <span style="color:var(--text-muted); font-size:13px;">OR</span>
                    <hr style="flex:1; border-color:var(--border)">
                </div>
                <a href="http://localhost:8081/oauth2/authorization/google" class="btn btn-outline btn-full" style="display:flex; align-items:center; justify-content:center; gap:10px;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                    Continue with Google
                </a>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('error-msg');

            btn.textContent = 'Logging in...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({ email: data.email, name: data.name }));
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = 'Invalid email or password';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Make sure backend is running.';
                errorMsg.classList.remove('hidden');
            }

            btn.textContent = 'Login';
            btn.disabled = false;
        });
    </script>
</body>
</html>
